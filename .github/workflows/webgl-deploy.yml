name: WebGL Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build WebGL
        run: |
          docker run --rm \
            -e UNITY_EMAIL="${{ secrets.UNITY_EMAIL }}" \
            -e UNITY_PASSWORD="${{ secrets.UNITY_PASSWORD }}" \
            -v "$PWD":/workspace \
            -w /workspace \
            unityci/editor:ubuntu-6000.4.1f1-webgl-3 \
            /bin/bash -c '\
              set -o pipefail && \
              echo "=== Creating BlankProject ===" && \
              mkdir -p /BlankProject/Assets && \
              echo "=== Activating named-user license ===" && \
              activated=false; \
              for i in 1 2 3 4 5; do \
                echo "--- Activation attempt $i ---" && \
                unity-editor \
                  -quit -batchmode \
                  -serial \
                  -username "$UNITY_EMAIL" \
                  -password "$UNITY_PASSWORD" \
                  -projectPath /BlankProject \
                  -logFile /tmp/activation.log \
                  2>&1 && \
                activated=true && \
                echo "=== Activation successful ===" && \
                break; \
                echo "Activation failed, retrying in 15s..." && \
                sleep 15; \
              done; \
              if [ "$activated" = false ]; then \
                echo "=== Activation log ===" && \
                cat /tmp/activation.log 2>/dev/null || true && \
                exit 1; \
              fi && \
              echo "=== Build ===" && \
              unity-editor \
                -quit -batchmode \
                -nographics \
                -projectPath /workspace \
                -executeMethod BuildWebGL.Build \
                -logFile /tmp/build.log \
                2>&1; \
              EXIT_CODE=$?; \
              echo "EXIT_CODE=$EXIT_CODE"; \
              echo "=== Build log ===" && \
              tail -30 /tmp/build.log 2>/dev/null || true; \
              exit $EXIT_CODE; \
            '

      - name: Check build output
        run: ls -la Builds/WebGL/ || echo "Build directory not found"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Builds/WebGL

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
