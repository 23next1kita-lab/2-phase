name: WebGL Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build WebGL
        shell: cmd
        run: |
          "C:\Program Files\Unity\Hub\Editor\6000.4.1f1\Editor\Unity.exe" -quit -batchmode -projectPath "%GITHUB_WORKSPACE%" -executeMethod BuildWebGL.Build -logFile build.log
          set UNITY_ERR=%ERRORLEVEL%
          type build.log
          exit /b !UNITY_ERR!

      - name: Add Git bash to PATH
        shell: powershell
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Builds/WebGL

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
