name: WebGL Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build WebGL
        run: |
          docker run --rm \
            -e UNITY_EMAIL="${{ secrets.UNITY_EMAIL }}" \
            -e UNITY_PASSWORD="${{ secrets.UNITY_PASSWORD }}" \
            -v "$PWD":/workspace \
            -w /workspace \
            unityci/editor:ubuntu-6000.4.1f1-webgl-3 \
            /bin/bash -c '\
              mkdir -p /BlankProject/Assets && \
              echo "=== Step 1: Activate license ===" && \
              unity-editor \
                -quit -batchmode \
                -serial \
                -username "$UNITY_EMAIL" \
                -password "$UNITY_PASSWORD" \
                -projectPath /BlankProject \
                -logFile /tmp/activation.log \
                2>&1; \
              echo "=== Activation log (first 60 lines) ===" && \
              head -60 /tmp/activation.log 2>/dev/null; \
              echo "=== Step 2: Check license files ===" && \
              find /root -name "UnityEntitlementLicense.xml" 2>/dev/null; \
              find /root -name "*.ulf" 2>/dev/null; \
              find /root/.local/share/unity3d -type f 2>/dev/null || true; \
              find /root/.config/unity3d -type f 2>/dev/null || true; \
              echo "=== Step 3: Build ===" && \
              unity-editor \
                -quit -batchmode \
                -nographics \
                -projectPath /workspace \
                -executeMethod BuildWebGL.Build \
                -logFile /tmp/build.log \
                2>&1; \
              EXIT_CODE=$?; \
              echo "EXIT_CODE=$EXIT_CODE"; \
              echo "=== Build log (last 30) ===" && \
              tail -30 /tmp/build.log 2>/dev/null || true; \
              exit $EXIT_CODE; \
            '

      - name: Check build output
        run: ls -la Builds/WebGL/ || echo "Build directory not found"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Builds/WebGL

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
