name: WebGL Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Write license file
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          mkdir -p /tmp/unity-license
          echo "$UNITY_LICENSE" > /tmp/unity-license/UnityEntitlementLicense.xml

      - name: Build WebGL
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -v /tmp/unity-license/UnityEntitlementLicense.xml:/root/.config/unity3d/Unity/UnityEntitlementLicense.xml:ro \
            -w /workspace \
            unityci/editor:ubuntu-6000.4.1f1-webgl-3 \
            /bin/bash -c '\
              unity-editor \
                -quit -batchmode \
                -projectPath /workspace \
                -executeMethod BuildWebGL.Build \
                -logFile /tmp/build.log \
                2>&1; \
              echo "BUILD_EXIT_CODE=$?"; \
            '

      - name: Check build output
        run: ls -la Builds/WebGL/ || echo "Build directory not found"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Builds/WebGL

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
